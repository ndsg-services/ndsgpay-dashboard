<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDSGPay — Test Paiement Production</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F0EDE6; --blue: #1A5FB4; --blue-dark: #144d96; --blue-light: #EAF1FB;
      --text: #1a1a18; --muted: #6b6b65;
      --border: rgba(26,26,24,0.12); --border-strong: rgba(26,26,24,0.18);
      --success: #1a7a3c; --success-bg: #eaf5ef;
      --danger: #c0392b; --danger-bg: #fdf0ee;
      --warning: #92600a; --warning-bg: #fdf5e6;
      --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--sans); background: var(--cream); color: var(--text); min-height: 100vh; padding: 32px 20px; }
    .container { max-width: 480px; margin: 0 auto; }
    .header { margin-bottom: 28px; }
    .logo { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .logo span { color: var(--blue); }
    .prod-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; background: var(--success-bg); color: var(--success); border: 1px solid rgba(26,122,60,.2); margin-left: 8px; }
    .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; background: var(--cream); border: 1px solid var(--border-strong); border-radius: 8px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color .2s; }
    .form-input:focus, .form-select:focus { border-color: var(--blue); }

    .btn { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: var(--blue-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .result { margin-top: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); display: none; }
    .result-header { padding: 10px 14px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .result-header.success { background: var(--success-bg); color: var(--success); }
    .result-header.error { background: var(--danger-bg); color: var(--danger); }
    .result-header.loading { background: var(--blue-light); color: var(--blue); }
    .result-body { background: #1a1a18; padding: 14px; overflow-x: auto; }
    .result-body pre { font-family: var(--mono); font-size: 11px; color: #cdd6f4; line-height: 1.6; white-space: pre-wrap; }

    .info-box { background: var(--warning-bg); border: 1px solid rgba(146,96,10,.2); border-radius: 10px; padding: 14px 16px; font-size: 12px; color: var(--warning); line-height: 1.6; margin-bottom: 16px; }

    .status-card { background: var(--success-bg); border: 1px solid rgba(26,122,60,.2); border-radius: 12px; padding: 20px; text-align: center; display: none; }
    .status-icon { font-size: 36px; margin-bottom: 12px; }
    .status-title { font-size: 16px; font-weight: 500; color: var(--success); margin-bottom: 4px; }
    .status-sub { font-size: 13px; color: var(--muted); }
    .tx-id { font-family: var(--mono); font-size: 11px; background: #fff; padding: 6px 12px; border-radius: 6px; margin-top: 12px; word-break: break-all; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .step-indicator { display: flex; gap: 8px; margin-bottom: 20px; }
    .step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
    .step.active { background: var(--blue); }
    .step.done { background: var(--success); }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">NDSG<span>Pay</span> <span class="prod-badge">🚀 Production</span></div>
    <div class="sub">Test de paiement réel — vrai argent</div>
  </div>

  <div class="info-box">
    ⚠️ <strong>Attention</strong> — ce test utilise de vrais fonds. Utilise un petit montant (100 XAF minimum).
  </div>

  <!-- Login -->
  <div id="login-card" class="card">
    <div class="card-title"><div class="dot" style="background:var(--blue)"></div>Connexion NDSGPay</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" value="support@ndsgservices.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" />
    </div>
    <button class="btn" onclick="doLogin(this)">Se connecter</button>
    <div id="login-error" style="display:none;font-size:12px;color:var(--danger);margin-top:10px;text-align:center"></div>
  </div>

  <!-- Paiement -->
  <div id="payment-card" class="card" style="display:none">
    <div class="card-title"><div class="dot" style="background:var(--success)"></div>Initier un dépôt</div>
    <div class="step-indicator">
      <div class="step done" id="step-1"></div>
      <div class="step active" id="step-2"></div>
      <div class="step" id="step-3"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Montant (XAF)</label>
      <input type="number" class="form-input" id="amount" value="500" min="100" />
    </div>
    <div class="form-group">
      <label class="form-label">Opérateur</label>
      <select class="form-select" id="correspondent">
        <option value="AIRTEL_GAB">Airtel Money — Gabon</option>
        <option value="MOOV_GAB">Moov Money — Gabon</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Ton numéro de téléphone</label>
      <input type="text" class="form-input" id="msisdn" placeholder="24177XXXXXX" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input type="text" class="form-input" id="description" value="Test NDSGPay" />
    </div>
    <button class="btn" onclick="initiateDeposit(this)">📥 Lancer le paiement</button>
    <div class="result" id="result-payment"></div>
  </div>

  <!-- Statut -->
  <div id="status-card" class="status-card">
    <div class="status-icon">⏳</div>
    <div class="status-title">En attente de confirmation</div>
    <div class="status-sub">Une demande a été envoyée sur ton téléphone. Accepte-la pour confirmer le paiement.</div>
    <div class="tx-id" id="tx-id-display"></div>
    <button class="btn" style="margin-top:16px" onclick="checkStatus()">🔍 Vérifier le statut</button>
    <div class="result" id="result-status" style="text-align:left"></div>
  </div>

</div>

<script>
  const API = 'https://ndsgpay-backend.vercel.app/api';
  let jwtToken = null;
  let currentDepositId = null;

  async function doLogin(btn) {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return;

    btn.innerHTML = '<div class="spinner"></div> Connexion...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!data.success) {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-error').textContent = data.error || 'Erreur de connexion';
        btn.innerHTML = 'Se connecter';
        btn.disabled = false;
        return;
      }

      jwtToken = data.token;
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('payment-card').style.display = 'block';

    } catch (err) {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').textContent = 'Erreur réseau';
      btn.innerHTML = 'Se connecter';
      btn.disabled = false;
    }
  }

  async function initiateDeposit(btn) {
    const amount = document.getElementById('amount').value;
    const correspondent = document.getElementById('correspondent').value;
    const msisdn = document.getElementById('msisdn').value;
    const description = document.getElementById('description').value;

    if (!msisdn) { alert('Entre ton numéro de téléphone'); return; }

    btn.innerHTML = '<div class="spinner"></div> Envoi en cours...';
    btn.disabled = true;

    const result = document.getElementById('result-payment');
    result.style.display = 'block';
    result.innerHTML = '<div class="result-header loading"><div class="spinner" style="border-color:rgba(26,95,180,.3);border-top-color:var(--blue)"></div> Initiation du paiement...</div>';

    try {
      const res = await fetch(`${API}/pay/deposits`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${jwtToken}`
        },
        body: JSON.stringify({ amount: parseInt(amount), currency: 'XAF', correspondent, msisdn, description })
      });
      const data = await res.json();

      if (data.success) {
        currentDepositId = data.depositId;
        result.innerHTML = `<div class="result-header success">✅ Paiement initié</div><div class="result-body"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;

        // Afficher la carte de statut
        setTimeout(() => {
          document.getElementById('payment-card').style.display = 'none';
          document.getElementById('status-card').style.display = 'block';
          document.getElementById('tx-id-display').textContent = `ID : ${data.depositId}`;
          document.getElementById('step-3').classList.add('active');
        }, 1500);

      } else {
        result.innerHTML = `<div class="result-header error">❌ Erreur</div><div class="result-body"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        btn.innerHTML = '📥 Lancer le paiement';
        btn.disabled = false;
      }

    } catch (err) {
      result.innerHTML = `<div class="result-header error">❌ Erreur réseau</div><div class="result-body"><pre>${err.message}</pre></div>`;
      btn.innerHTML = '📥 Lancer le paiement';
      btn.disabled = false;
    }
  }

  async function checkStatus() {
    if (!currentDepositId) return;

    const result = document.getElementById('result-status');
    result.style.display = 'block';
    result.innerHTML = '<div class="result-header loading"><div class="spinner" style="border-color:rgba(26,95,180,.3);border-top-color:var(--blue)"></div> Vérification...</div>';

    try {
      const res = await fetch(`${API}/deposits/${currentDepositId}`, {
        headers: { 'Authorization': `Bearer ${jwtToken}` }
      });
      const data = await res.json();

      const status = data.deposit?.status || 'INCONNU';

      if (status === 'COMPLETED') {
        document.getElementById('status-card').style.background = 'var(--success-bg)';
        document.querySelector('.status-icon').textContent = '🎉';
        document.querySelector('.status-title').textContent = 'Paiement confirmé !';
        document.querySelector('.status-sub').textContent = 'Le paiement a été reçu avec succès.';
        result.innerHTML = `<div class="result-header success">✅ COMPLETED</div><div class="result-body"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      } else if (status === 'FAILED') {
        document.querySelector('.status-icon').textContent = '❌';
        document.querySelector('.status-title').textContent = 'Paiement échoué';
        result.innerHTML = `<div class="result-header error">❌ FAILED</div><div class="result-body"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      } else {
        result.innerHTML = `<div class="result-header loading">⏳ ${status}</div><div class="result-body"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      }

    } catch (err) {
      result.innerHTML = `<div class="result-header error">❌ Erreur</div><div class="result-body"><pre>${err.message}</pre></div>`;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('login-card').style.display !== 'none') {
        doLogin(document.querySelector('.btn'));
      }
    }
  });
</script>
</body>
</html>
