<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDSGPay — Admin NDSG</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F0EDE6; --cream-dark: #E8E4DC;
      --blue: #1A5FB4; --blue-dark: #144d96; --blue-light: #EAF1FB;
      --text: #1a1a18; --muted: #6b6b65;
      --border: rgba(26,26,24,0.1); --border-strong: rgba(26,26,24,0.18);
      --success: #1a7a3c; --success-bg: #eaf5ef;
      --danger: #c0392b; --danger-bg: #fdf0ee;
      --warning: #92600a; --warning-bg: #fdf5e6;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--sans); background: var(--cream); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-box { width:100%; max-width:380px; padding:40px; background:#fff; border:1px solid var(--border-strong); border-radius:16px; box-shadow:0 4px 40px rgba(0,0,0,.07); }
    .login-logo { font-size:18px; font-weight:500; margin-bottom:4px; }
    .login-logo span { color:var(--blue); }
    .login-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:var(--danger-bg); color:var(--danger); border:1px solid rgba(192,57,43,.2); margin-bottom:24px; }
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:11px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .form-input { width:100%; padding:10px 14px; background:var(--cream); border:1px solid var(--border-strong); border-radius:8px; font-family:var(--sans); font-size:14px; color:var(--text); outline:none; transition:border-color .2s; }
    .form-input:focus { border-color:var(--blue); }
    .btn-login { width:100%; padding:11px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; margin-top:6px; transition:background .2s; }
    .btn-login:hover { background:var(--blue-dark); }

    /* APP */
    #app { display:none; }
    .topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-logo { font-size:16px; font-weight:500; }
    .topbar-logo span { color:var(--blue); }
    .topbar-badge { font-size:10px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:var(--danger-bg); color:var(--danger); border:1px solid rgba(192,57,43,.2); margin-left:8px; }
    .topbar-right { display:flex; align-items:center; gap:12px; font-size:13px; color:var(--muted); }
    .btn-logout { padding:6px 14px; border-radius:7px; border:1px solid var(--border-strong); background:transparent; font-size:12px; cursor:pointer; font-family:var(--sans); color:var(--text); transition:background .15s; }
    .btn-logout:hover { background:var(--cream-dark); }

    .content { max-width:1100px; margin:0 auto; padding:32px; }

    /* KPI */
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .kpi { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; }
    .kpi-label { font-size:10px; font-weight:500; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .kpi-value { font-family:var(--serif); font-size:28px; font-weight:400; color:var(--text); line-height:1; }
    .kpi-sub { font-size:11px; color:var(--muted); margin-top:6px; }

    /* TABLE */
    .table-card { background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .table-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
    .table-title { font-size:14px; font-weight:500; }
    .filters { display:flex; gap:8px; }
    .filter-btn { padding:5px 14px; border-radius:20px; font-size:12px; cursor:pointer; border:1px solid var(--border-strong); background:#fff; color:var(--muted); font-family:var(--sans); transition:all .15s; }
    .filter-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); font-weight:500; }
    table { width:100%; border-collapse:collapse; }
    thead th { font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding:10px 20px; text-align:left; border-bottom:1px solid var(--border); background:var(--cream); }
    tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--cream); }
    tbody td { padding:14px 20px; font-size:13px; }
    .td-muted { color:var(--muted); }
    .td-mono { font-family:var(--mono); font-size:11px; color:var(--muted); }

    /* BADGES */
    .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; }
    .badge::before { content:''; width:5px; height:5px; border-radius:50%; }
    .badge.active { background:var(--success-bg); color:var(--success); }
    .badge.active::before { background:var(--success); }
    .badge.pending { background:var(--warning-bg); color:var(--warning); }
    .badge.pending::before { background:var(--warning); }

    /* BOUTONS ACTION */
    .btn-activate { padding:5px 14px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:none; font-family:var(--sans); transition:all .15s; }
    .btn-activate.activate { background:var(--success-bg); color:var(--success); border:1px solid rgba(26,122,60,.2); }
    .btn-activate.activate:hover { background:#d4edda; }
    .btn-activate.deactivate { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(192,57,43,.2); }
    .btn-activate.deactivate:hover { background:#fbe0dd; }

    /* MODAL DÉTAIL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,26,24,.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .modal { background:#fff; border-radius:16px; width:100%; max-width:480px; padding:28px; box-shadow:0 24px 64px rgba(0,0,0,.15); }
    .modal-title { font-family:var(--serif); font-size:20px; font-weight:400; margin-bottom:20px; }
    .detail-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:var(--muted); }
    .detail-value { font-weight:500; color:var(--text); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .btn-modal { flex:1; padding:10px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:var(--sans); border:1px solid var(--border-strong); background:transparent; }
    .btn-modal.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    .btn-modal.primary:hover { background:var(--blue-dark); }
    .btn-modal:not(.primary):hover { background:var(--cream-dark); }

    .tab-btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:400; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:var(--sans); transition:all .2s; }
    .tab-btn.active { background:#fff; color:var(--blue); font-weight:500; box-shadow:0 1px 4px rgba(0,0,0,.08); }

    /* EMPTY */
    .empty { padding:48px; text-align:center; color:var(--muted); font-size:13px; }

    /* SPINNER */
    .spinner { width:14px; height:14px; border:2px solid rgba(26,95,180,.3); border-top-color:var(--blue); border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:768px) {
      .kpi-grid { grid-template-columns:repeat(2,1fr); }
      .content { padding:16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">NDSG<span>Pay</span></div>
    <div class="login-badge">🔐 Accès Admin NDSG</div>
    <div class="form-group">
      <label class="form-label">Clé admin secrète</label>
      <input type="password" class="form-input" id="admin-key" placeholder="••••••••••••••••" />
    </div>
    <button class="btn-login" onclick="doAdminLogin()">Accéder au panel</button>
    <div id="login-error" style="display:none;font-size:12px;color:var(--danger);margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <span class="topbar-logo">NDSG<span>Pay</span></span>
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span id="admin-email">NDSG Services</span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi"><div class="kpi-label">Marchands total</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">Inscrits</div></div>
      <div class="kpi"><div class="kpi-label">Marchands actifs</div><div class="kpi-value" id="kpi-active">—</div><div class="kpi-sub">En production</div></div>
      <div class="kpi"><div class="kpi-label">Volume total traité</div><div class="kpi-value" id="kpi-volume">—</div><div class="kpi-sub">XAF</div></div>
      <div class="kpi" style="border:1.5px solid var(--blue);background:var(--blue-light)"><div class="kpi-label" style="color:var(--blue)">Frais collectés</div><div class="kpi-value" id="kpi-fees" style="color:var(--blue)">—</div><div class="kpi-sub">Revenus NDSGPay</div></div>
    </div>

    <!-- TABS -->
    <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--cream-dark);padding:4px;border-radius:10px;width:fit-content">
      <button class="tab-btn active" id="tab-merchants" onclick="switchTab('merchants')">👥 Marchands</button>
      <button class="tab-btn" id="tab-transactions" onclick="switchTab('transactions')">💳 Transactions</button>
    </div>

    <!-- MARCHANDS -->
    <div id="panel-merchants">
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Marchands NDSGPay</div>
          <div class="filters">
            <button class="filter-btn active" onclick="filterMerchants(this,'all')">Tous</button>
            <button class="filter-btn" onclick="filterMerchants(this,'pending')">En attente</button>
            <button class="filter-btn" onclick="filterMerchants(this,'active')">Actifs</button>
          </div>
        </div>
        <div id="table-body">
          <div class="empty"><div class="spinner"></div><br/>Chargement...</div>
        </div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="panel-transactions" style="display:none">
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Toutes les transactions</div>
          <div class="filters">
            <button class="filter-btn active" onclick="filterTx(this,'all','all')">Toutes</button>
            <button class="filter-btn" onclick="filterTx(this,'deposit','all')">Dépôts</button>
            <button class="filter-btn" onclick="filterTx(this,'payout','all')">Payouts</button>
            <button class="filter-btn" onclick="filterTx(this,'all','COMPLETED')">Réussies</button>
            <button class="filter-btn" onclick="filterTx(this,'all','FAILED')">Échouées</button>
          </div>
        </div>
        <div id="tx-table-body">
          <div class="empty">Cliquez sur "Transactions" pour charger</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL DÉTAIL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Détails marchand</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-modal" onclick="closeModal()">Fermer</button>
      <button class="btn-modal primary" id="modal-action-btn">Activer</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://ndsgpay-backend.vercel.app/api';
  let adminKey = sessionStorage.getItem('ndsgpay_admin_key') || null;
  let allMerchants = [];
  let selectedMerchant = null;

  // Init
  window.addEventListener('DOMContentLoaded', () => {
    if (adminKey) loadApp();
  });

  // Login
  async function doAdminLogin() {
    const key = document.getElementById('admin-key').value;
    if (!key) return;

    // Test la clé en appelant une route admin
    try {
      const res = await fetch(`${API}/admin/stats`, {
        headers: { 'x-admin-key': key }
      });
      const data = await res.json();

      if (!data.success) {
        showError('Clé invalide ou accès refusé');
        return;
      }

      adminKey = key;
      sessionStorage.setItem('ndsgpay_admin_key', adminKey);
      loadApp(data.stats);

    } catch (err) {
      showError('Erreur de connexion');
    }
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    el.textContent = msg;
  }

  async function loadApp(stats) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (stats) updateKPIs(stats);
    else await loadStats();
    await loadMerchants();
  }

  function doLogout() {
    adminKey = null;
    sessionStorage.removeItem('ndsgpay_admin_key');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-key').value = '';
  }

  // Stats
  async function loadStats() {
    try {
      const res = await fetch(`${API}/admin/stats`, { headers: { 'x-admin-key': adminKey } });
      const data = await res.json();
      if (data.success) updateKPIs(data.stats);
    } catch (err) { console.error(err); }
  }

  function updateKPIs(s) {
    document.getElementById('kpi-total').textContent = s.totalMerchants;
    document.getElementById('kpi-active').textContent = s.activeMerchants;
    document.getElementById('kpi-volume').textContent = formatXAF(s.totalVolume);
    document.getElementById('kpi-fees').textContent = formatXAF(s.totalFees) + ' XAF';
  }

  function switchTab(tab) {
    document.getElementById('panel-merchants').style.display = tab === 'merchants' ? 'block' : 'none';
    document.getElementById('panel-transactions').style.display = tab === 'transactions' ? 'block' : 'none';
    document.getElementById('tab-merchants').classList.toggle('active', tab === 'merchants');
    document.getElementById('tab-transactions').classList.toggle('active', tab === 'transactions');
    if (tab === 'transactions') loadTransactions('all', 'all');
  }

  async function loadTransactions(type = 'all', status = 'all') {
    document.getElementById('tx-table-body').innerHTML = '<div class="empty"><div class="spinner"></div><br/>Chargement...</div>';
    try {
      const res = await fetch(`${API}/admin/transactions?type=${type}&status=${status}&limit=100`, {
        headers: { 'x-admin-key': adminKey }
      });
      const data = await res.json();
      if (!data.success) return;
      renderTransactions(data.transactions);
    } catch (err) {
      document.getElementById('tx-table-body').innerHTML = '<div class="empty">Erreur de chargement</div>';
    }
  }

  function filterTx(btn, type, status) {
    document.querySelectorAll('#panel-transactions .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTransactions(type, status);
  }

  function renderTransactions(txs) {
    if (txs.length === 0) {
      document.getElementById('tx-table-body').innerHTML = '<div class="empty">Aucune transaction</div>';
      return;
    }

    const rows = txs.map(tx => `
      <tr>
        <td class="td-mono">${tx.txId?.slice(0,8)}...</td>
        <td>${tx.type === 'deposit' ? '📥 Dépôt' : '📤 Payout'}</td>
        <td><strong>${tx.merchant?.name || '—'}</strong><br/><span class="td-muted" style="font-size:11px">${tx.merchant?.email || ''}</span></td>
        <td>${tx.correspondent}</td>
        <td class="td-muted">${tx.msisdn}</td>
        <td style="font-weight:500">${formatXAF(tx.amount)} XAF</td>
        <td><span class="badge ${tx.status === 'COMPLETED' ? 'active' : tx.status === 'INITIATED' ? '' : 'pending'}" style="${tx.status === 'FAILED' ? 'background:var(--danger-bg);color:var(--danger)' : ''}">${tx.status}</span></td>
        <td class="td-muted">${new Date(tx.createdAt).toLocaleDateString('fr-FR')} ${new Date(tx.createdAt).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</td>
      </tr>
    `).join('');

    document.getElementById('tx-table-body').innerHTML = `
      <table>
        <thead><tr>
          <th>ID</th><th>Type</th><th>Marchand</th><th>Opérateur</th><th>Numéro</th><th>Montant</th><th>Statut</th><th>Date</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Marchands
  async function loadMerchants() {
    try {
      const res = await fetch(`${API}/admin/merchants`, { headers: { 'x-admin-key': adminKey } });
      const data = await res.json();
      if (!data.success) return;
      allMerchants = data.merchants;
      renderMerchants(allMerchants);
    } catch (err) {
      document.getElementById('table-body').innerHTML = '<div class="empty">Erreur de chargement</div>';
    }
  }

  function filterMerchants(btn, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let filtered = allMerchants;
    if (filter === 'active') filtered = allMerchants.filter(m => m.isActive);
    if (filter === 'pending') filtered = allMerchants.filter(m => !m.isActive);
    renderMerchants(filtered);
  }

  function renderMerchants(merchants) {
    if (merchants.length === 0) {
      document.getElementById('table-body').innerHTML = '<div class="empty">Aucun marchand trouvé</div>';
      return;
    }

    const rows = merchants.map(m => `
      <tr>
        <td><strong>${m.name}</strong><br/><span class="td-muted">${m.email}</span></td>
        <td class="td-muted">${m.phone || '—'}</td>
        <td><span class="badge ${m.isActive ? 'active' : 'pending'}">${m.isActive ? 'Actif' : 'En attente'}</span></td>
        <td class="td-muted">${m._count.deposits + m._count.payouts} tx</td>
        <td class="td-muted">${new Date(m.createdAt).toLocaleDateString('fr-FR')}</td>
        <td>
          <button class="btn-activate ${m.isActive ? 'deactivate' : 'activate'}" onclick="openModal('${m.id}')">
            ${m.isActive ? 'Désactiver' : 'Activer'}
          </button>
        </td>
      </tr>
    `).join('');

    document.getElementById('table-body').innerHTML = `
      <table>
        <thead><tr>
          <th>Marchand</th><th>Téléphone</th><th>Statut</th><th>Transactions</th><th>Inscription</th><th>Action</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Modal
  function openModal(merchantId) {
    selectedMerchant = allMerchants.find(m => m.id === merchantId);
    if (!selectedMerchant) return;

    const m = selectedMerchant;
    document.getElementById('modal-title').textContent = m.name;
    document.getElementById('modal-body').innerHTML = `
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${m.email}</span></div>
      <div class="detail-row"><span class="detail-label">Téléphone</span><span class="detail-value">${m.phone || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">Statut</span><span class="detail-value"><span class="badge ${m.isActive ? 'active' : 'pending'}">${m.isActive ? 'Actif' : 'En attente'}</span></span></div>
      <div class="detail-row"><span class="detail-label">Clé API</span><span class="detail-value" style="font-family:var(--mono);font-size:11px">${m.apiKey}</span></div>
      <div class="detail-row"><span class="detail-label">Dépôts</span><span class="detail-value">${m._count.deposits}</span></div>
      <div class="detail-row"><span class="detail-label">Payouts</span><span class="detail-value">${m._count.payouts}</span></div>
      <div class="detail-row"><span class="detail-label">Inscrit le</span><span class="detail-value">${new Date(m.createdAt).toLocaleDateString('fr-FR')}</span></div>
    `;

    const actionBtn = document.getElementById('modal-action-btn');
    actionBtn.textContent = m.isActive ? 'Désactiver le compte' : '✅ Activer le compte';
    actionBtn.style.background = m.isActive ? 'var(--danger)' : 'var(--blue)';
    actionBtn.onclick = () => toggleMerchant(m.id, !m.isActive);

    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    selectedMerchant = null;
  }

  async function toggleMerchant(id, activate) {
    const btn = document.getElementById('modal-action-btn');
    btn.innerHTML = '<div class="spinner"></div>';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/admin/merchants/${id}/activate`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ isActive: activate })
      });
      const data = await res.json();

      if (data.success) {
        closeModal();
        await loadStats();
        await loadMerchants();
      } else {
        alert(data.error || 'Erreur');
      }
    } catch (err) {
      alert('Erreur de connexion');
    }
    btn.disabled = false;
  }

  function formatXAF(amount) {
    if (!amount) return '0';
    return new Intl.NumberFormat('fr-FR').format(Math.round(amount));
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doAdminLogin();
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
